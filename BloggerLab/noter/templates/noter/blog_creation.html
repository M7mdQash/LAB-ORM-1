{% extends "main/base.html" %}

{% block content%}
<h1>Welcome to blog making!</h1>
    <form method="post" action="{% url 'noter:create_blog_view'%}" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-3">
            <label for="title" class="form-label">Title</label>
            <input type="text" class="form-control" id="title" name="title" required>
        </div>
        <div class="mb-3">
            <label for="content" class="form-label">Content</label>
            <textarea class="form-control" id="content" name="content" rows="5" required></textarea>
        </div>
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="is_published" name="is_published">
                <label class="form-check-label" for="is_published">Publish Now</label>
            </div>
        <!-- selecting date to publish -->
        <div class="mb-3">
            <label for="publish_date" class="form-label">Publish Date</label>
            <input type="date" class="form-control" id="published_at" name="published_at">
        </div> 
        <!-- selecting image -->
        <div class="mb-3">
            <label for="image" class="form-label">Blog Image</label>
            <input type="file" class="form-control" id="image" name="image">
        </div>
        <!-- selecting file-->

        <div class="mb-3">
            <label for="file" class="form-label">Blog File</label>
            <input type="file" class="form-control" id="file" name="file">
        </div>

        <button type="submit" class="btn btn-primary">Create Blog Post</button>
    </form>
{%endblock%}
