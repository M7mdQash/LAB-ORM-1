{% extends "main/base.html" %}

{% block content%}
<h1>Edit blogs here!</h1>
    <form method="post" action="{% url 'noter:blog_update_view' blog.id%}" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-3">
            <label for="title" class="form-label">Title</label>
            <input type="text" class="form-control" id="title" name="title" value="{{blog.title}}" required>
        </div>
        <div class="mb-3">
            <label for="content" class="form-label">Content</label>
            <textarea class="form-control" id="content" name="content" rows="5" required>{{blog.content}}</textarea>
        </div>
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="is_published" name="is_published" value="" {% if blog.is_published %}checked{% endif %}>
                <label class="form-check-label" for="is_published">Published?</label>
            </div>
        <!-- selecting date to publish -->
        <div class="mb-3">
            <label for="publish_date" class="form-label">Publish Date</label>
            <input type="date" class="form-control" id="published_at" name="published_at" value="{{blog.published_at.isoformat}}">
        </div> 
        <!-- selecting image -->
        <div class="mb-3">
            <label for="image" class="form-label">Blog Image</label>
            <input type="file" class="form-control" id="image" name="image" value="{{blog.image.url}}">
        </div>
        <!-- selecting file-->

        <div class="mb-3">
            <label for="file" class="form-label">Blog File</label>
            <input type="file" class="form-control" id="file" name="file">
        </div>

        <button type="submit" class="btn btn-primary">Update Blog Post</button>
    </form>
{%endblock%}
